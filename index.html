/* ---------- local storage helpers (data stays on this device only) ---------- */
function loadJSON(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  } catch (e) { return fallback; }
}
function saveJSON(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); return true; }
  catch (e) { return false; }
}

const STATUS = {
  vacant: { label: "خالی", color: "#9CA3AF", bg: "#EEF0F2", text: "#4B5563" },
  reserved: { label: "رزرو", color: "#D97706", bg: "#FEF3C7", text: "#92400E" },
  sold: { label: "فروخته‌شده", color: "#15803D", bg: "#DCFCE7", text: "#166534" },
};
const APP_NAME = "Metrico";

const uid = () => Math.random().toString(36).slice(2, 10);
const fmt = (n) => (Number(n) || 0).toLocaleString("en-US");

function emptyUnit(floor, unitNumber) {
  return {
    id: uid(), floor, unitNumber, area: "", status: "vacant", direction: "none",
    buyerName: "", buyerPhone: "", postalCode: "",
    pricePerMeter: "", downPayment: "",
    installments: [], contractDocs: [], checkDocs: [], notes: "",
  };
}
function totalPriceOf(u) { return (Number(u.area) || 0) * (Number(u.pricePerMeter) || 0); }
function paidOf(u) {
  const inst = (u.installments || []).reduce((s, i) => s + (i.paid ? Number(i.amount) || 0 : 0), 0);
  return inst + (Number(u.downPayment) || 0);
}
function remainingOf(u) { return totalPriceOf(u) - paidOf(u); }

function revenueOf(project) {
  return project.units.filter((u) => u.status === "sold").reduce((s, u) => s + totalPriceOf(u), 0);
}
function expensesTotalOf(project) {
  return (project.expenses || []).reduce((s, e) => s + (Number(e.amount) || 0), 0);
}
function profitOf(project) {
  return revenueOf(project) - expensesTotalOf(project);
}

function DonutChart({ data, size = 84, thickness = 13 }) {
  const [gid] = useState(() => "dg" + Math.random().toString(36).slice(2, 8));
  const total = data.reduce((s, d) => s + Math.max(0, d.value), 0);
  const r = (size - thickness) / 2;
  const circumference = 2 * Math.PI * r;

  if (total <= 0) {
    return (
      <div style={{ perspective: 350 }}>
        <svg width={size} height={size} style={{ transform: "rotateX(56deg)" }}>
          <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#E5E7EB" strokeWidth={thickness} />
        </svg>
      </div>
    );
  }

  let cumulative = 0;
  const slices = data.filter((d) => d.value > 0).map((d, i) => {
    const frac = d.value / total;
    const dash = frac * circumference;
    const gap = circumference - dash;
    const offset = -cumulative;
    cumulative += dash;
    return { ...d, dash, gap, offset, key: i };
  });

  return (
    <div style={{ perspective: 420 }}>
      <svg width={size} height={size} style={{ transform: "rotateX(58deg)", filter: "drop-shadow(0 6px 5px rgba(0,0,0,0.32))" }}>
        <defs>
          {slices.map((s, i) => (
            <linearGradient key={i} id={`${gid}-${i}`} x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stopColor={s.color} stopOpacity="1" />
              <stop offset="100%" stopColor={s.color} stopOpacity="0.62" />
            </linearGradient>
          ))}
          <radialGradient id={`${gid}-center`} cx="50%" cy="35%" r="65%">
            <stop offset="0%" stopColor="#fff" stopOpacity="0.35" />
            <stop offset="100%" stopColor="#fff" stopOpacity="0" />
          </radialGradient>
        </defs>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#F1F5F9" strokeWidth={thickness} />
        <g style={{ transform: "rotate(-90deg)", transformOrigin: "50% 50%" }}>
          {slices.map((s, i) => (
            <circle key={i} cx={size / 2} cy={size / 2} r={r} fill="none" stroke={`url(#${gid}-${i})`} strokeWidth={thickness}
              strokeDasharray={`${s.dash} ${s.gap}`} strokeDashoffset={s.offset} strokeLinecap="butt" />
          ))}
        </g>
        <circle cx={size / 2} cy={size / 2} r={r} fill={`url(#${gid}-center)`} />
      </svg>
    </div>
  );
}

function resizeImage(file, maxW = 1000, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

  // Watch Supabase auth session
  useEffect(() => {
    window.sb.auth.getSession().then(({ data }) => {
      setUser(data.session?.user || null);
      setAuthLoading(false);
    });
    const { data: listener } = window.sb.auth.onAuthStateChange((_event, session) => {
      const u = session?.user || null;
      setUser(u);
      setAuthLoading(false);
      if (!u) {
        setActivated(null);
        setCompany(null);
        setProjects([]);
        setActiveTab(null);
        setLoaded(false);
        setScreen("dashboard");
      }
    });
    return () => listener.subscription.unsubscribe();
  }, []);

  // Check activation status once authenticated
  useEffect(() => {
    if (!user) return;
    setActivated(null);
    window.sb.from("profiles").select("activated").eq("user_id", user.id).maybeSingle()
      .then(({ data, error: err }) => {
        if (err) { setError("خطا در بررسی وضعیت فعال‌سازی: " + err.message); setActivated(false); return; }
        setActivated(!!(data && data.activated));
      });
  }, [user]);

  // Load this user's projects + company from Supabase once authenticated and activated
  useEffect(() => {
    if (!user || !activated) return;
    setLoaded(false);
    setCompany(user.user_metadata?.company || null);
    window.sb.from("projects").select("*").eq("user_id", user.id).order("created_at", { ascending: true })
      .then(({ data, error: err }) => {
        if (err) {
          setError("خطا در دریافت اطلاعات از سرور: " + err.message);
          setLoaded(true);
          return;
        }
        const list = (data || []).map((row) => ({ id: row.id, name: row.name, ...(row.data || {}) }));
        setProjects(list);
        if (list.length) setActiveTab(list[0].id);
        setLoaded(true);
      });
  }, [user, activated]);

  const activeProject = useMemo(() => projects.find((p) => p.id === activeTab) || null, [projects, activeTab]);
  const openUnit = useMemo(
    () => (activeProject ? activeProject.units.find((u) => u.id === openUnitId) : null),
    [activeProject, openUnitId]
  );

  function updateProject(id, updater) {
    setProjects((prev) => {
      const next = prev.map((p) => (p.id === id ? updater(p) : p));
      const updated = next.find((p) => p.id === id);
      if (updated && user) {
        clearTimeout(updateTimers.current[id]);
        updateTimers.current[id] = setTimeout(() => {
          const { id: _id, name, ...rest } = updated;
          window.sb.from("projects").update({ name, data: rest }).eq("id", id)
            .then(({ error: err }) => { if (err) setError("ذخیره‌سازی ناموفق بود: " + err.message); });
        }, 500);
      }
      return next;
    });
  }
  function updateUnit(projectId, unitId, updater) {
    updateProject(projectId, (p) => ({ ...p, units: p.units.map((u) => (u.id === unitId ? updater(u) : u)) }));
  }

  async function createProject(name, floors) {
    const sorted = [...floors].sort((a, b) => a.number - b.number);
    const units = [];
    let seq = 1;
    sorted.forEach((f) => {
      for (let i = 1; i <= f.count; i++) {
        units.push(emptyUnit(f.number, String(seq)));
        seq++;
      }
    });
    const dataPayload = { floors, units, expenses: [] };
    const { data, error: err } = await window.sb.from("projects")
      .insert({ user_id: user.id, name, data: dataPayload }).select().single();
    if (err) { setError("ساخت پروژه ناموفق بود: " + err.message); return; }
    const project = { id: data.id, name: data.name, ...(data.data || {}) };
    setProjects((prev) => [...prev, project]);
    setActiveTab(project.id);
    setScreen("app");
    setShowNewProject(false);
  }

  function addFloor(projectId, count) {
    updateProject(projectId, (p) => {
      const nextNum = p.floors.length ? Math.max(...p.floors.map((f) => f.number)) + 1 : 1;
      const maxSeq = p.units.length ? Math.max(...p.units.map((u) => Number(u.unitNumber) || 0)) : 0;
      const newUnits = [];
      for (let i = 1; i <= count; i++) newUnits.push(emptyUnit(nextNum, String(maxSeq + i)));
      return { ...p, floors: [...p.floors, { number: nextNum, count }], units: [...p.units, ...newUnits] };
    });
  }
  function renameProject(projectId, name) { updateProject(projectId, (p) => ({ ...p, name })); }

  function addExpense(projectId, expense) {
    updateProject(projectId, (p) => ({ ...p, expenses: [...(p.expenses || []), { id: uid(), ...expense }] }));

    updateProject(projectId, (p) => ({ ...p, expenses: (p.expenses || []).filter((e) => e.id !== expenseId) }));

      if (activeTab === projectId) setActiveTab(next.length ? next[0].id : null);
      return next;

    const expenseRows = (project.expenses || []).slice().sort((a, b) => (b.date || "").localeCompare(a.date || "")).map((e) => `
      <tr><td>${esc(e.title)}</td><td>${esc(e.date || "-")}</td><td>${fmt(e.amount)}</td></tr>`).join("");

    return `<!DOCTYPE html><html lang="fa" dir="rtl"><head><meta charset="UTF-8"><title>گزارش مالی - ${esc(project.name)}</title>
      <style>
        body{font-family:Tahoma,Arial,sans-serif;color:#14213D;padding:20px;}
        table{width:100%;border-collapse:collapse;}
        td,th{border:1px solid #E5E7EB;padding:6px 8px;font-size:12px;}
        .card{background:#F4F6F5;border-radius:12px;padding:14px;margin-bottom:10px;}
        .print-btn{position:fixed;top:10px;left:10px;background:#14213D;color:#fff;border:none;padding:10px 16px;border-radius:8px;font-size:14px;}
        @media print{.print-btn{display:none;}}
      </style></head><body>
      <button class="print-btn" onclick="window.print()">چاپ / ذخیره PDF</button>
      <div style="display:flex;align-items:center;gap:10px;border-bottom:2px solid #14213D;padding-bottom:12px;margin-bottom:16px;">
        ${companyInfo?.logo ? `<img src="${companyInfo.logo}" style="width:44px;height:44px;border-radius:10px;object-fit:cover;">` : ""}
        <div><div style="font-weight:800;font-size:18px;">${esc(companyInfo?.name)}</div>
        <div style="font-size:11px;color:#6B7280;">گزارش مالی پروژه: ${esc(project.name)} — ${new Date().toLocaleDateString("en-GB")}</div></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">
        <div class="card"><div style="font-size:11px;color:#6B7280;">وضعیت واحدها</div>
          <div style="font-size:13px;font-weight:700;margin-top:4px;">${soldCount} فروخته‌شده · ${reservedCount} رزرو · ${vacantCount} خالی</div></div>
        <div class="card"><div style="font-size:11px;color:#6B7280;">درآمد حاصل از فروش</div>
          <div style="font-size:15px;font-weight:800;margin-top:4px;">${fmt(revenue)} تومان</div></div>
        <div class="card"><div style="font-size:11px;color:#6B7280;">مبلغ دریافتی از خریداران</div>
          <div style="font-size:14px;font-weight:700;margin-top:4px;color:#166534;">${fmt(paidTotal)} تومان</div></div>
        <div class="card"><div style="font-size:11px;color:#6B7280;">مانده طلب از خریداران</div>
          <div style="font-size:14px;font-weight:700;margin-top:4px;color:#B91C1C;">${fmt(remainingTotal)} تومان</div></div>
        <div class="card"><div style="font-size:11px;color:#6B7280;">مجموع هزینه‌های پروژه</div>
          <div style="font-size:14px;font-weight:700;margin-top:4px;color:#B91C1C;">${fmt(expenses)} تومان</div></div>
        <div class="card" style="background:${profit >= 0 ? "#DCFCE7" : "#FEE2E2"};">
          <div style="font-size:11px;color:#6B7280;">${profit >= 0 ? "سود پروژه" : "زیان پروژه"} تا این لحظه</div>
          <div style="font-size:16px;font-weight:800;margin-top:4px;color:${profit >= 0 ? "#166534" : "#B91C1C"};">${fmt(Math.abs(profit))} تومان</div></div>
      </div>

      <div style="font-weight:700;font-size:13px;margin-bottom:8px;">ریز هزینه‌های ثبت‌شده</div>
      ${expenseRows ? `<table><thead><tr style="background:#F4F6F5;"><th style="text-align:right;">عنوان</th><th style="text-align:right;">تاریخ</th><th style="text-align:right;">مبلغ (تومان)</th></tr></thead><tbody>${expenseRows}</tbody></table>` : `<div style="font-size:12px;color:#9CA3AF;">هزینه‌ای ثبت نشده است.</div>`}

      ${buildBuildingGraphicHTML(project)}
    </body></html>`;
  }

  function openReport(scope) {
    try {
      const list = scope === "all" ? projects : projects.filter((p) => p.id === activeTab);
      const html = buildReportHTML(company, list);
      const blob = new Blob([html], { type: "text/html" });
      const url = URL.createObjectURL(blob);
      window.open(url, "_blank");
    } catch (e) {
      setError("ساخت گزارش ناموفق بود.");
    }
  }

  function openFinancialReport(project) {
    try {
      const html = buildFinancialReportHTML(company, project);
      const blob = new Blob([html], { type: "text/html" });
      const url = URL.createObjectURL(blob);
      window.open(url, "_blank");
    } catch (e) {
      setError("ساخت گزارش مالی ناموفق بود.");
    }
  }

  function deleteFloor(projectId, floorNumber) {
    updateProject(projectId, (p) => {
      const remainingFloors = p.floors.filter((f) => f.number !== floorNumber);
      const sorted = [...remainingFloors].sort((a, b) => a.number - b.number);
      const remainingUnitsByFloor = {};
      p.units.filter((u) => u.floor !== floorNumber).forEach((u) => {
        remainingUnitsByFloor[u.floor] = remainingUnitsByFloor[u.floor] || [];
        remainingUnitsByFloor[u.floor].push(u);
      });
      let seq = 1;
      const renumbered = [];
      sorted.forEach((f) => {
        const list = (remainingUnitsByFloor[f.number] || []).sort((a, b) => Number(a.unitNumber) - Number(b.unitNumber));
        list.forEach((u) => { renumbered.push({ ...u, unitNumber: String(seq) }); seq++; });
      });
      return { ...p, floors: sorted, units: renumbered };
    });
  }

  async function saveCompany(c) {
    setCompany(c);
    setShowCompanySettings(false);
    const { data, error: err } = await window.sb.auth.updateUser({ data: { company: c } });
    if (err) setError("ذخیره اطلاعات شرکت ناموفق بود: " + err.message);
    else if (data?.user) setUser(data.user);
  }

  function logout() {
    window.sb.auth.signOut().catch(() => {});
    setShowMenu(false);
  }

  function exportBackup() {
    try {
      const payload = { version: 2, exportedAt: new Date().toISOString(), company, projects };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `backup-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    } catch (e) {
      setError("ساخت فایل پشتیبان ناموفق بود.");
    }
  }

  function restoreBackup(file, onDone) {
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data || !Array.isArray(data.projects)) throw new Error("invalid");

        await window.sb.from("projects").delete().eq("user_id", user.id);

        let list = [];
        if (data.projects.length) {
          const rows = data.projects.map((p) => {
            const { id: _id, name, ...rest } = p;
            return { user_id: user.id, name, data: rest };
          });
          const { data: inserted, error: err } = await window.sb.from("projects").insert(rows).select();
          if (err) throw err;
          list = inserted.map((row) => ({ id: row.id, name: row.name, ...(row.data || {}) }));
        }

        if (data.company) {
          const { data: udata, error: uerr } = await window.sb.auth.updateUser({ data: { company: data.company } });
          if (!uerr && udata?.user) { setUser(udata.user); setCompany(data.company); }
        } else {
          setCompany(null);
        }

        setProjects(list);
        setActiveTab(list.length ? list[0].id : null);
        onDone(true, null);
      } catch (e) {
        onDone(false, "فایل پشتیبان معتبر نیست یا بازیابی ناموفق بود.");
      }
    };
    reader.onerror = () => onDone(false, "خواندن فایل ناموفق بود.");
    reader.readAsText(file);
  }

  if (authLoading) return <div className="min-h-screen bg-[#F4F6F5]" />;
  if (!user) {
    return <LoginScreen onSuccess={() => setScreen("dashboard")} />;
  }
  if (activated === null) return <div className="min-h-screen bg-[#F4F6F5]" />;
  if (!activated) {
    return (
      <ActivationGate
        onActivated={() => setActivated(true)}
        onLogout={() => window.sb.auth.signOut()}
      />
    );
  }
  if (!loaded) return <div className="min-h-screen bg-[#F4F6F5]" />;
  if (!company) return <CompanySetup onSave={saveCompany} />;

  return (
    <div dir="rtl" className="min-h-screen bg-[#F4F6F5] text-[#14213D] flex flex-col">
      {error && (
        <div className="fixed top-3 left-1/2 -translate-x-1/2 z-[70] bg-red-600 text-white text-sm px-4 py-2 rounded-lg shadow-lg">
          {error}<button className="mr-3 underline" onClick={() => setError("")}>بستن</button>
        </div>
      )}

      <div className="bg-[#14213D] text-white px-4 pt-6 pb-4 flex items-center gap-3 relative overflow-hidden">
        <div className="absolute inset-0 opacity-[0.07]" style={{
          backgroundImage: "linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px)",
          backgroundSize: "20px 20px",
        }} />
        <button onClick={() => setShowMenu(true)} className="relative p-2 -ml-1 text-white/90"><Menu size={22} /></button>
        <button onClick={() => setScreen("dashboard")} className="relative p-2 text-white/90" title="نمای کلی پروژه‌ها">
          <Wallet size={20} />
        </button>
        <button onClick={() => setShowCompanySettings(true)} className="relative flex items-center gap-2 flex-1 text-right">
          {company.logo ? (
            <img src={company.logo} alt="" className="w-10 h-10 rounded-xl object-cover border border-white/20" />
          ) : (
            <div className="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center"><Building2 size={20} /></div>
          )}
          <div>
            <div className="font-extrabold text-base leading-tight">{company.name}</div>
            <div className="text-[10px] text-[#C9A227] font-medium">Metrico — مدیریت پروژه‌های ساختمانی</div>
          </div>
        </button>
      </div>

      <div className="flex-1 overflow-y-auto pb-6">
        {screen === "about" && <AboutScreen onBack={() => setScreen("dashboard")} />}
        {screen === "backup" && (
          <BackupScreen
            onBack={() => setScreen("dashboard")}
            onExport={exportBackup}
            onRestore={restoreBackup}
            projectCount={projects.length}
          />
        )}
        {screen === "dashboard" && (
          <DashboardScreen
            projects={projects}
            onOpenProject={(id) => { setActiveTab(id); setScreen("app"); }}
            onNewProject={() => setShowNewProject(true)}
          />
        )}
        {screen === "app" && (
          activeProject ? (
            <ProjectPanel
              project={activeProject}
              onOpenUnit={(id) => setOpenUnitId(id)}
              onOpenSettings={() => setShowProjectSettings(true)}
              onOpenExpenses={() => setShowExpenses(true)}
              onPrint={() => openReport("project")}
              onFinancialReport={() => openFinancialReport(activeProject)}
              onBackToDashboard={() => setScreen("dashboard")}
            />
          ) : (
            <div className="text-center text-[#6B7280] mt-20 text-sm px-8">
              هنوز پروژه‌ای اضافه نشده. از منوی ☰ بالای صفحه، «پروژه جدید» را بساز.
            </div>
          )
        )}
      </div>

      {showMenu && (
        <SideMenu
          company={company}
          projects={projects}
          activeTab={activeTab}
          currentScreen={screen}
          onOpenDashboard={() => { setScreen("dashboard"); setShowMenu(false); }}
          onSelectProject={(id) => { setActiveTab(id); setScreen("app"); setShowMenu(false); }}
          onNewProject={() => { setShowNewProject(true); setShowMenu(false); }}
          onClose={() => setShowMenu(false)}
          onOpenBackup={() => { setScreen("backup"); setShowMenu(false); }}
          onOpenAbout={() => { setScreen("about"); setShowMenu(false); }}
          onExportAll={() => { openReport("all"); setShowMenu(false); }}
          onLogout={logout}
        />
      )}

      {showExpenses && activeProject && (
        <ExpensesSheet
          project={activeProject}
          onClose={() => setShowExpenses(false)}
          onAdd={(expense) => addExpense(activeProject.id, expense)}
          onRemove={(id) => removeExpense(activeProject.id, id)}
        />
      )}

      {showCompanySettings && (
        <CompanySetup
          initial={company}
          onSave={saveCompany}
          onClose={() => setShowCompanySettings(false)}
          user={user}
          onError={(msg) => setError(msg)}
        />
      )}

      {showNewProject && <NewProjectSheet onCancel={() => setShowNewProject(false)} onCreate={createProject} />}

      {showProjectSettings && activeProject && (
        <ProjectSettingsSheet
          project={activeProject}
          onClose={() => setShowProjectSettings(false)}
          onRename={(name) => renameProject(activeProject.id, name)}
          onAddFloor={(count) => addFloor(activeProject.id, count)}
          onDeleteFloor={(floorNumber) => deleteFloor(activeProject.id, floorNumber)}
          onDelete={() => deleteProject(activeProject.id)}
        />
      )}

      {openUnit && activeProject && (
        <UnitModal
          unit={openUnit}
          onClose={() => setOpenUnitId(null)}
          onChange={(updater) => updateUnit(activeProject.id, openUnit.id, updater)}
        />
      )}
    </div>
  );
}

function BackupScreen({ onBack, onExport, onRestore, projectCount }) {
  const fileRef = useRef(null);
  const [msg, setMsg] = useState(null);
  const [confirmRestore, setConfirmRestore] = useState(null);

  function pickFile() { fileRef.current.click(); }
  function handleFile(e) {
    const file = e.target.files?.[0];
    e.target.value = "";
    if (!file) return;
    setConfirmRestore(file);
  }
  function doRestore() {
    onRestore(confirmRestore, (ok, err) => {
      setConfirmRestore(null);
      setMsg(ok ? { type: "ok", text: "اطلاعات با موفقیت بازیابی شد." } : { type: "err", text: err });
    });
  }

  return (
    <div className="px-5 pt-5 pb-10">
      <div className="flex items-center gap-3 mb-6">
        <button onClick={onBack} className="p-1"><ChevronLeft size={20} /></button>
        <div className="font-bold text-lg">پشتیبان‌گیری و بازیابی</div>
      </div>

      <div className="bg-white rounded-2xl p-4 border border-black/5 mb-4">
        <div className="font-semibold text-sm mb-1">دریافت فایل پشتیبان</div>
        <div className="text-xs text-[#6B7280] mb-3">
          یک فایل شامل تمام اطلاعات شرکت و {projectCount} پروژه (واحدها، خریداران، اقساط) ساخته می‌شود. این فایل را جای امنی (گوگل‌درایو، ایمیل و...) نگه دار.
        </div>
        <button onClick={onExport} className="w-full flex items-center justify-center gap-2 bg-[#14213D] text-white rounded-xl py-2.5 text-sm font-semibold">
          <Download size={15} /> دانلود فایل پشتیبان
        </button>
      </div>

      <div className="bg-white rounded-2xl p-4 border border-black/5">
        <div className="font-semibold text-sm mb-1">بازیابی از فایل پشتیبان</div>
        <div className="text-xs text-[#B91C1C] mb-3">
          ⚠️ توجه: بازیابی، تمام اطلاعات فعلی این گوشی را با اطلاعات فایل پشتیبان جایگزین می‌کند.
        </div>
        <button onClick={pickFile} className="w-full flex items-center justify-center gap-2 border border-[#14213D]/20 text-[#14213D] rounded-xl py-2.5 text-sm font-semibold">
          <Upload size={15} /> انتخاب فایل پشتیبان
        </button>
        <input ref={fileRef} type="file" accept="application/json,.json" className="hidden" onChange={handleFile} />
      </div>

      {msg && (
        <div className={`mt-4 text-sm rounded-xl p-3 ${msg.type === "ok" ? "bg-green-50 text-[#166534]" : "bg-red-50 text-[#B91C1C]"}`}>
          {msg.text}
        </div>
      )}

      {confirmRestore && (
        <div className="fixed inset-0 bg-black/40 flex items-end z-[80]">
          <div className="bg-white w-full rounded-t-2xl p-5">
            <div className="font-bold mb-1">بازیابی اطلاعات؟</div>
            <div className="text-sm text-[#6B7280] mb-4">تمام اطلاعات فعلی با محتوای فایل «{confirmRestore.name}» جایگزین می‌شود. این کار قابل بازگشت نیست.</div>
            <div className="flex gap-2">
              <button onClick={() => setConfirmRestore(null)} className="flex-1 border border-black/10 rounded-xl py-2.5 text-sm font-medium">لغو</button>
              <button onClick={doRestore} className="flex-1 bg-[#B91C1C] text-white rounded-xl py-2.5 text-sm font-medium">بازیابی</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ActivationGate({ onActivated, onLogout }) {
  const [code, setCode] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);
  const [confirmLogout, setConfirmLogout] = useState(false);

  async function handleSubmit(e) {
    e.preventDefault();
    if (!code.trim()) { setError("کد فعال‌سازی را وارد کن."); return; }
    setBusy(true);
    setError("");
    try {
      const { data, error: err } = await window.sb.rpc("activate_with_code", { code_input: code.trim() });
      if (err) {
        setError("خطا: " + err.message);
      } else if (data === true) {
        onActivated();
      } else {
        setError("کد نامعتبر است یا قبلاً استفاده شده.");
      }
    } catch (e2) {
      setError("خطایی رخ داد. دوباره امتحان کن.");
    }
    setBusy(false);
  }

  return (
    <div dir="rtl" className="min-h-screen flex items-center justify-center px-6 relative overflow-hidden" style={{ background: "#14213D" }}>
      <div className="absolute inset-0 opacity-[0.06]" style={{
        backgroundImage: "linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px)",
        backgroundSize: "26px 26px",
      }} />
      <div className="relative w-full max-w-sm bg-white rounded-3xl shadow-2xl p-8">
        <div className="flex flex-col items-center mb-7">
          <div className="w-16 h-16 rounded-2xl flex items-center justify-center mb-3" style={{ background: "#14213D" }}>
            <Building2 size={28} className="text-[#C9A227]" />
          </div>
          <div className="font-extrabold text-lg text-[#14213D]">فعال‌سازی حساب</div>
          <div className="text-xs text-[#9CA3AF] font-medium mt-1 text-center leading-6">
            حساب شما ساخته شد، اما هنوز فعال نشده.<br />
            کد فعال‌سازی را از مدیر سیستم بگیر و اینجا وارد کن.
          </div>
        </div>

        <form onSubmit={handleSubmit} className="flex flex-col gap-4">
          <input
            value={code}
            onChange={(e) => { setCode(e.target.value); setError(""); }}
            className="w-full bg-[#F4F6F5] border border-black/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-[#14213D] text-center tracking-widest font-semibold"
            placeholder="کد فعال‌سازی"
            dir="ltr"
          />
          {error && <div className="text-xs text-[#B91C1C] text-center">{error}</div>}
          <button type="submit" disabled={busy} className="w-full bg-[#14213D] text-white font-semibold rounded-xl py-3 text-sm disabled:opacity-60">

          </button>
        </form>

        <div className="text-center mt-4">
          {!confirmLogout ? (
            <button onClick={() => setConfirmLogout(true)} className="text-xs text-[#6B7280]">خروج و ورود با حساب دیگر</button>
          ) : (
            <div className="flex gap-2 justify-center mt-1">
              <button onClick={() => setConfirmLogout(false)} className="text-xs border border-black/10 rounded-lg px-3 py-1.5">لغو</button>
              <button onClick={onLogout} className="text-xs bg-[#B91C1C] text-white rounded-lg px-3 py-1.5">خروج</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function LoginScreen({ onSuccess }) {
  const [mode, setMode] = useState("login"); // login | signup | reset
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [pw2, setPw2] = useState("");
  const [error, setError] = useState("");
  const [info, setInfo] = useState("");
  const [busy, setBusy] = useState(false);
  const [shake, setShake] = useState(false);

  function fail(msg) {
    setError(msg);
    setShake(true);
    setTimeout(() => setShake(false), 400);
  }

  function friendlyError(e) {
    const msg = e.message || "";
    if (msg.includes("Invalid login credentials")) return "ایمیل یا رمز عبور اشتباه است.";
    if (msg.includes("User already registered")) return "این ایمیل قبلاً ثبت شده است.";
    if (msg.toLowerCase().includes("password should be at least")) return "رمز عبور باید حداقل ۶ کاراکتر باشد.";
    if (msg.includes("Unable to validate email") || msg.includes("invalid")) return "ایمیل معتبر نیست.";
    if (msg.includes("Email not confirmed")) return "ایمیل هنوز تأیید نشده. لینک تأیید ارسال‌شده به ایمیلت را باز کن.";
    if (msg.includes("rate limit") || msg.includes("Too many")) return "تلاش‌های زیاد ناموفق. کمی صبر کن و دوباره امتحان کن.";
    if (msg.includes("Failed to fetch") || msg.includes("network")) return "خطای اتصال به اینترنت.";
    return msg || "خطایی رخ داد.";
  }

  async function handleSubmit(e) {
    e.preventDefault();
    setError(""); setInfo("");
    if (!email.trim()) { fail("ایمیل را وارد کن."); return; }

    if (mode === "reset") {
      setBusy(true);
      const { error: err } = await window.sb.auth.resetPasswordForEmail(email.trim());
      if (err) fail(friendlyError(err));
      else setInfo("لینک بازیابی رمز به ایمیلت ارسال شد.");
      setBusy(false);
      return;
    }

    if (!pw) { fail("رمز عبور را وارد کن."); return; }
    if (mode === "signup" && pw !== pw2) { fail("رمز عبور و تکرار آن یکسان نیستند."); return; }

    setBusy(true);
    if (mode === "signup") {
      const { data, error: err } = await window.sb.auth.signUp({ email: email.trim(), password: pw });
      if (err) { fail(friendlyError(err)); setBusy(false); return; }
      if (data.session) {
        onSuccess();
      } else {
        setInfo("حساب ساخته شد. لینک تأیید به ایمیلت ارسال شد؛ بعد از تأیید، وارد شو.");
        setMode("login");
      }
    } else {
      const { error: err } = await window.sb.auth.signInWithPassword({ email: email.trim(), password: pw });
      if (err) { fail(friendlyError(err)); setBusy(false); return; }
      onSuccess();
    }
    setBusy(false);
  }

  return (
    <div dir="rtl" className="min-h-screen flex items-center justify-center px-6 relative overflow-hidden" style={{ background: "#14213D" }}>
      <div className="absolute inset-0 opacity-[0.06]" style={{
        backgroundImage: "linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px)",
        backgroundSize: "26px 26px",
      }} />
      <style>{`
        @keyframes shakeX { 10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(4px)} 30%,50%,70%{transform:translateX(-8px)} 40%,60%{transform:translateX(8px)} }
        .shake-anim { animation: shakeX 0.4s; }
      `}</style>

      <div className={`relative w-full max-w-sm bg-white rounded-3xl shadow-2xl p-8 ${shake ? "shake-anim" : ""}`}>
        <div className="flex flex-col items-center mb-7">
          <div className="w-16 h-16 rounded-2xl flex items-center justify-center mb-3" style={{ background: "#14213D" }}>
            <Building2 size={28} className="text-[#C9A227]" />
          </div>
          <div className="font-extrabold text-lg text-[#14213D]">{APP_NAME}</div>
          <div className="text-[11px] text-[#9CA3AF] font-medium -mt-0.5">مدیریت پروژه‌های ساختمانی</div>
          <div className="text-xs text-[#9CA3AF] mt-1">
            {mode === "login" && "برای ورود، ایمیل و رمز عبور را وارد کن"}
            {mode === "signup" && "ساخت حساب جدید"}
            {mode === "reset" && "بازیابی رمز عبور"}
          </div>
        </div>

        <form onSubmit={handleSubmit} className="flex flex-col gap-4">
          <div>
            <label className="text-xs text-[#6B7280] font-medium">ایمیل</label>
            <input
              type="email"
              value={email}
              onChange={(e) => { setEmail(e.target.value); setError(""); }}
              className="w-full mt-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-[#14213D]"
              placeholder="you@example.com"
              autoCapitalize="none"
              dir="ltr"
            />
          </div>

          {mode !== "reset" && (
            <div>
              <label className="text-xs text-[#6B7280] font-medium">رمز عبور</label>
              <input
                type="password"
                value={pw}
                onChange={(e) => { setPw(e.target.value); setError(""); }}
                className="w-full mt-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-[#14213D]"
                placeholder="رمز عبور"
                dir="ltr"
              />
            </div>
          )}

          {mode === "signup" && (
            <div>
              <label className="text-xs text-[#6B7280] font-medium">تکرار رمز عبور</label>
              <input
                type="password"
                value={pw2}
                onChange={(e) => { setPw2(e.target.value); setError(""); }}
                className="w-full mt-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-[#14213D]"
                placeholder="تکرار رمز عبور"
                dir="ltr"
              />
            </div>
          )}

          {error && <div className="text-xs text-[#B91C1C] text-center -mt-1">{error}</div>}
          {info && <div className="text-xs text-[#166534] text-center -mt-1">{info}</div>}

          <button type="submit" disabled={busy} className="w-full bg-[#14213D] text-white font-semibold rounded-xl py-3 text-sm mt-1 disabled:opacity-60" style={{ boxShadow: "0 8px 20px -8px #14213D" }}>
            {busy ? "لطفاً صبر کن..." : mode === "login" ? "ورود" : mode === "signup" ? "ساخت حساب" : "ارسال لینک بازیابی"}
          </button>
        </form>

        <div className="flex items-center justify-between mt-4 text-xs">
          {mode === "login" ? (
            <>
              <button onClick={() => { setMode("reset"); setError(""); setInfo(""); }} className="text-[#6B7280]">رمز را فراموش کرده‌ام</button>
              <button onClick={() => { setMode("signup"); setError(""); setInfo(""); }} className="text-[#14213D] font-semibold">ساخت حساب جدید</button>
            </>
          ) : (
            <button onClick={() => { setMode("login"); setError(""); setInfo(""); }} className="text-[#14213D] font-semibold mx-auto">بازگشت به ورود</button>
          )}
        </div>
      </div>
    </div>
  );
}

function CompanySetup({ initial, onSave, onClose, user, onError }) {
  const [name, setName] = useState(initial?.name || "");
  const [logo, setLogo] = useState(initial?.logo || null);
  const fileRef = useRef(null);
  const [showPwForm, setShowPwForm] = useState(false);
  const [curPw, setCurPw] = useState("");
  const [newPw, setNewPw] = useState("");
  const [confirmPw, setConfirmPw] = useState("");
  const [pwMsg, setPwMsg] = useState("");
  const [pwBusy, setPwBusy] = useState(false);

  async function handlePasswordChange() {
    if (newPw.length < 6) { setPwMsg("رمز جدید باید حداقل ۶ کاراکتر باشد."); return; }
    if (newPw !== confirmPw) { setPwMsg("رمز جدید و تکرار آن یکسان نیستند."); return; }
    setPwBusy(true);
    setPwMsg("");
    try {
      const { error: verifyErr } = await window.sb.auth.signInWithPassword({ email: user.email, password: curPw });
      if (verifyErr) { setPwMsg("رمز فعلی اشتباه است."); setPwBusy(false); return; }
      const { error: err } = await window.sb.auth.updateUser({ password: newPw });
      if (err) throw err;
      setPwMsg("رمز عبور با موفقیت تغییر کرد.");
      setCurPw(""); setNewPw(""); setConfirmPw("");
    } catch (e) {
      setPwMsg("خطا: " + (e.message || "تغییر رمز ناموفق بود."));
    }
    setPwBusy(false);
  }

  async function handleLogo(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const dataUrl = await resizeImage(file, 300, 0.8);
      setLogo(dataUrl);
    } catch (err) {
      try {
        const reader = new FileReader();
        reader.onload = () => setLogo(reader.result);
        reader.readAsDataURL(file);
      } catch (err2) {}
    }
    e.target.value = "";
  }

  const body = (
    <div className="w-full max-w-sm bg-white rounded-2xl p-6 shadow-xl">
      <div className="flex items-center gap-2 text-[#14213D] font-extrabold text-lg mb-1">
        <Building2 size={20} /> اطلاعات شرکت
      </div>
      <div className="text-xs text-[#6B7280] mb-5">این اطلاعات بالای اپ نمایش داده می‌شود</div>

      <div className="flex flex-col items-center gap-2 mb-5">
        <button onClick={() => fileRef.current.click()} className="w-20 h-20 rounded-2xl bg-[#F4F6F5] border border-dashed border-black/20 flex items-center justify-center overflow-hidden">
          {logo ? <img src={logo} className="w-full h-full object-cover" alt="لوگو" /> : <Upload size={20} className="text-[#9CA3AF]" />}
        </button>
        <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={handleLogo} />
        <span className="text-[11px] text-[#9CA3AF]">افزودن لوگو</span>
      </div>

      <label className="text-xs text-[#6B7280] font-medium">نام شرکت</label>
      <input
        value={name}
        onChange={(e) => setName(e.target.value)}
        placeholder="مثلاً گروه ساختمانی سپهر"
        className="w-full mt-1 mb-5 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]"
      />

      {onClose && user && (
        <div className="mb-5 border-t border-black/10 pt-4">
          <div className="text-[11px] text-[#9CA3AF] mb-2">وارد شده با: {user.email}</div>
          <button onClick={() => { setShowPwForm((v) => !v); setPwMsg(""); }} className="text-xs font-semibold text-[#14213D] flex items-center gap-1">
            تغییر رمز عبور {showPwForm ? "▲" : "▼"}
          </button>
          {showPwForm && (
            <div className="flex flex-col gap-2 mt-3">
              <input type="password" value={curPw} onChange={(e) => setCurPw(e.target.value)} placeholder="رمز فعلی"
                className="w-full bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]" />
              <input type="password" value={newPw} onChange={(e) => setNewPw(e.target.value)} placeholder="رمز جدید (حداقل ۶ کاراکتر)"
                className="w-full bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]" />
              <input type="password" value={confirmPw} onChange={(e) => setConfirmPw(e.target.value)} placeholder="تکرار رمز جدید"
                className="w-full bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]" />
              {pwMsg && <div className={`text-xs ${pwMsg.includes("موفقیت") ? "text-[#166534]" : "text-[#B91C1C]"}`}>{pwMsg}</div>}
              <button onClick={handlePasswordChange} disabled={pwBusy} className="bg-[#14213D] text-white rounded-xl py-2.5 text-sm font-semibold disabled:opacity-50">
                {pwBusy ? "در حال ثبت..." : "ثبت رمز جدید"}
              </button>
            </div>
          )}
        </div>
      )}

      <div className="flex gap-2">
        {onClose && <button onClick={onClose} className="flex-1 border border-black/10 rounded-xl py-2.5 text-sm font-medium">لغو</button>}
        <button
          disabled={!name.trim()}
          onClick={() => onSave({ name: name.trim(), logo })}
          className="flex-1 bg-[#14213D] text-white rounded-xl py-2.5 text-sm font-semibold disabled:opacity-40"
        >ذخیره</button>
      </div>
    </div>
  );

  if (!onClose) {
    return (
      <div dir="rtl" className="min-h-screen bg-[#F4F6F5] flex items-center justify-center px-5">{body}</div>
    );
  }
  return <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[60] px-5 py-8 overflow-y-auto">{body}</div>;
}

function NewProjectSheet({ onCancel, onCreate }) {
  const [name, setName] = useState("");
  const [floors, setFloors] = useState([{ number: 1, count: 3 }]);

  function updateFloor(idx, field, value) {
    setFloors((prev) => prev.map((f, i) => (i === idx ? { ...f, [field]: value } : f)));
  }
  function addFloorRow() {
    const nextNum = floors.length ? Math.max(...floors.map((f) => f.number)) + 1 : 1;
    setFloors((prev) => [...prev, { number: nextNum, count: 3 }]);
  }
  function removeFloorRow(idx) { setFloors((prev) => prev.filter((_, i) => i !== idx)); }
  const canSave = name.trim() && floors.length > 0 && floors.every((f) => f.number && f.count > 0);
  const totalUnits = floors.reduce((s, f) => s + (Number(f.count) || 0), 0);

  return (
    <div className="fixed inset-0 bg-black/40 flex items-end z-[60]">
      <div className="bg-white w-full rounded-t-2xl p-5 max-h-[85vh] overflow-y-auto">
        <div className="flex items-center justify-between mb-4">
          <div className="font-bold text-lg">پروژه جدید</div>
          <button onClick={onCancel}><X size={20} /></button>
        </div>

        <label className="text-xs text-[#6B7280] font-medium">نام پروژه</label>
        <input
          value={name}
          onChange={(e) => setName(e.target.value)}
          placeholder="مثلاً سپهر ۴"
          className="w-full mt-1 mb-4 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]"
        />

        <div className="flex items-center justify-between mb-2">
          <label className="text-xs text-[#6B7280] font-medium">طبقات و تعداد واحد هر طبقه</label>
          <span className="text-xs text-[#9CA3AF]">مجموع: {totalUnits} واحد</span>
        </div>
        <div className="flex flex-col gap-2 mb-2">
          {floors.map((f, idx) => (
            <div key={idx} className="flex items-center gap-2 bg-[#F4F6F5] border border-black/10 rounded-xl p-2.5">
              <div className="flex-1">
                <div className="text-[10px] text-[#9CA3AF] mb-0.5">شماره طبقه</div>
                <input type="number" value={f.number} onChange={(e) => updateFloor(idx, "number", Number(e.target.value))} className="w-full outline-none text-sm font-medium bg-transparent" />
              </div>
              <div className="flex-1">
                <div className="text-[10px] text-[#9CA3AF] mb-0.5">تعداد واحد</div>
                <input type="number" value={f.count} onChange={(e) => updateFloor(idx, "count", Number(e.target.value))} className="w-full outline-none text-sm font-medium bg-transparent" />
              </div>
              <button onClick={() => removeFloorRow(idx)} className="p-2 text-[#B91C1C]"><Trash2 size={16} /></button>
            </div>
          ))}
        </div>
        <button onClick={addFloorRow} className="w-full flex items-center justify-center gap-1 border border-dashed border-black/20 rounded-xl py-2.5 text-sm text-[#6B7280] mb-5">
          <Plus size={15} /> افزودن طبقه
        </button>

        <button disabled={!canSave} onClick={() => onCreate(name.trim(), floors)} className="w-full bg-[#14213D] text-white font-semibold rounded-xl py-3 text-sm disabled:opacity-40">
          ساخت پروژه
        </button>
      </div>
    </div>
  );
}

function DashboardScreen({ projects, onOpenProject, onNewProject }) {
  const totals = useMemo(() => {
    let units = 0, sold = 0, vacant = 0, reserved = 0, revenue = 0, expenses = 0;
    projects.forEach((p) => {
      units += p.units.length;
      sold += p.units.filter((u) => u.status === "sold").length;
      vacant += p.units.filter((u) => u.status === "vacant").length;
      reserved += p.units.filter((u) => u.status === "reserved").length;
      revenue += revenueOf(p);
      expenses += expensesTotalOf(p);

    return { units, sold, vacant, reserved, revenue, expenses, profit: revenue - expenses };

  return (
    <div className="px-4 pt-4 pb-6">
      <div className="mb-4">
        <div className="font-extrabold text-lg">نمای کلی پروژه‌ها</div>

            <div className="flex justify-between text-xs mb-1"><span className="text-white/60">درآمد کل</span><span className="font-semibold">{fmt(totals.revenue)}</span></div>
            <div className="flex justify-between text-xs mb-1"><span className="text-white/60">هزینه کل</span><span className="font-semibold text-[#FCA5A5]">{fmt(totals.expenses)}</span></div>
            <div className="flex justify-between text-xs"><span className="text-white/60">{totals.profit >= 0 ? "سود کل" : "زیان کل"}</span><span className={`font-bold ${totals.profit >= 0 ? "text-[#86EFAC]" : "text-[#FCA5A5]"}`}>{fmt(Math.abs(totals.profit))}</span></div>

      {projects.length === 0 ? (

          <button onClick={onNewProject} className="block mx-auto mt-4 bg-[#14213D] text-white rounded-xl px-5 py-2.5 text-sm font-semibold">
            ساخت اولین پروژه
          </button>

      ) : (
        <div className="flex flex-col gap-3">
          {projects.map((p) => {

            const revenue = revenueOf(p);

            return (
              <button key={p.id} onClick={() => onOpenProject(p.id)} className="bg-white rounded-2xl border border-black/10 p-4 text-right shadow-sm">
                <div className="flex items-center justify-between mb-3">
                  <div className="font-bold text-[#14213D]">{p.name}</div>
                  <ChevronLeft size={16} className="rotate-180 text-[#9CA3AF]" />
                </div>
                <div className="flex items-center gap-4">
                  <DonutChart data={[{ value: expenses, color: "#EF4444" }, { value: Math.max(profit, 0), color: "#22C55E" }]} size={70} thickness={11} />
                  <div className="flex-1">
                    <div className="flex gap-1.5 mb-2 text-[10px] flex-wrap">
                      <span className="px-2 py-0.5 rounded-full" style={{ background: STATUS.sold.bg, color: STATUS.sold.text }}>{sold} فروخته</span>
                      <span className="px-2 py-0.5 rounded-full" style={{ background: STATUS.reserved.bg, color: STATUS.reserved.text }}>{reserved} رزرو</span>

function DocSection({ title, icon, docs, onAdd, onRemove }) {
  const [previewId, setPreviewId] = useState(null);
  const fileRef = useRef(null);

  async function handleFile(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const dataUrl = await resizeImage(file, 1200, 0.7);
      onAdd(file.name, dataUrl);
    } catch (err) {
      try {
        const reader = new FileReader();
        reader.onload = () => onAdd(file.name, reader.result);
        reader.readAsDataURL(file);
      } catch (err2) {}
    }
    e.target.value = "";
  }
  const preview = docs.find((d) => d.id === previewId);

  return (
    <div>
      <div className="flex items-center justify-between mb-2">
        <div className="text-xs font-semibold text-[#6B7280] flex items-center gap-1">{icon}{title}</div>
        <button onClick={() => fileRef.current.click()} className="text-xs text-[#14213D] font-semibold flex items-center gap-1">
          <Upload size={13} /> بارگذاری
        </button>
        <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={handleFile} />
      </div>
      {docs.length === 0 ? (
        <div className="text-xs text-[#9CA3AF] text-center py-2">فایلی بارگذاری نشده</div>
      ) : (
        <div className="flex gap-2 flex-wrap">
          {docs.map((d) => (
            <div key={d.id} className="relative w-16 h-16 rounded-lg overflow-hidden border border-black/10">
              <img src={d.dataUrl} className="w-full h-full object-cover cursor-pointer" onClick={() => setPreviewId(d.id)} alt={d.name} />
              <button onClick={() => onRemove(d.id)} className="absolute top-0.5 left-0.5 bg-black/60 rounded-full p-0.5">
                <X size={10} className="text-white" />
              </button>
            </div>
          ))}
        </div>
      )}
      {preview && (
        <div className="fixed inset-0 bg-black/80 z-[80] flex items-center justify-center p-6" onClick={() => setPreviewId(null)}>
          <img src={preview.dataUrl} className="max-w-full max-h-full rounded-lg" alt={preview.name} />
        </div>
      )}
    </div>
  );
}

function UnitModal({ unit, onClose, onChange }) {
  const s = STATUS[unit.status];
  const total = totalPriceOf(unit);
  const paid = paidOf(unit);
  const remaining = remainingOf(unit);

  function set(field, value) { onChange((u) => ({ ...u, [field]: value })); }
  function addInstallment() {
    onChange((u) => ({ ...u, installments: [...(u.installments || []), { id: uid(), date: "", amount: "", paid: false }] }));
  }
  function updateInstallment(id, field, value) {
    onChange((u) => ({ ...u, installments: u.installments.map((i) => (i.id === id ? { ...i, [field]: value } : i)) }));
  }
  function removeInstallment(id) {
    onChange((u) => ({ ...u, installments: u.installments.filter((i) => i.id !== id) }));
  }
  function addDoc(kind, name, dataUrl) {
    onChange((u) => ({ ...u, [kind]: [...(u[kind] || []), { id: uid(), name, dataUrl }] }));

          <div>
            <div className="flex items-center justify-between mb-2">
              <div className="text-xs font-semibold text-[#6B7280] flex items-center gap-1"><CalendarDays size={14} /> جدول اقساط</div>
              <button onClick={addInstallment} className="text-xs text-[#14213D] font-semibold flex items-center gap-1"><Plus size={13} /> قسط جدید</button>
            </div>
            <div className="flex flex-col gap-2">
              {(unit.installments || []).length === 0 && <div className="text-xs text-[#9CA3AF] text-center py-2">قسطی ثبت نشده</div>}
              {(unit.installments || []).map((i) => (
                <div key={i.id} className="bg-white border border-black/10 rounded-xl p-2.5 flex items-center gap-2">
                  <button onClick={() => updateInstallment(i.id, "paid", !i.paid)}>
                    {i.paid ? <CheckCircle2 size={20} /> : <Circle size={20} />}
                  </button>
                  <input type="date" value={i.date} onChange={(e) => updateInstallment(i.id, "date", e.target.value)} className="text-xs outline-none flex-1 min-w-0 bg-transparent" />
                  <input type="number" placeholder="مبلغ" value={i.amount} onChange={(e) => updateInstallment(i.id, "amount", e.target.value)} className="text-xs outline-none w-24 text-left bg-transparent" />
                  <button onClick={() => removeInstallment(i.id)} className="text-[#B91C1C] p-1"><Trash2 size={14} /></button>
                </div>
              ))}
            </div>
          </div>

          <DocSection title="مبایعه‌نامه" icon={<FileText size={14} />} docs={unit.contractDocs || []}
            onAdd={(name, dataUrl) => addDoc("contractDocs", name, dataUrl)} onRemove={(id) => removeDoc("contractDocs", id)} />
          <DocSection title="چک‌های فروش" icon={<Receipt size={14} />} docs={unit.checkDocs || []}
            onAdd={(name, dataUrl) => addDoc("checkDocs", name, dataUrl)} onRemove={(id) => removeDoc("checkDocs", id)} />

          <div>
            <label className="text-xs text-[#6B7280] font-medium">یادداشت</label>
            <textarea value={unit.notes} onChange={(e) => set("notes", e.target.value)} rows={3}
              className="w-full mt-1 bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]" />
          </div>
        </div>
      </div>
    </div>
  );
}

function PrintView({ company, projects }) {
  const grandRevenue = projects.reduce((s, p) => s + p.units.filter((u) => u.status === "sold").reduce((s2, u) => s2 + totalPriceOf(u), 0), 0);
  const td = { border: "1px solid #E5E7EB", padding: "5px 6px" };
  return (
    <div className="print-area" style={{ direction: "rtl", padding: "24px", color: "#14213D" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, borderBottom: "2px solid #14213D", paddingBottom: 12, marginBottom: 16 }}>
        {company?.logo && <img src={company.logo} style={{ width: 44, height: 44, borderRadius: 10, objectFit: "cover" }} alt="" />}
        <div>
          <div style={{ fontWeight: 800, fontSize: 18 }}>{company?.name}</div>
          <div style={{ fontSize: 11, color: "#6B7280" }}>گزارش پروژه‌های ساختمانی — {new Date().toLocaleDateString("en-GB")}</div>
        </div>
      </div>
      {projects.length > 1 && (
        <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 16 }}>مجموع درآمد کل پروژه‌ها: {fmt(grandRevenue)} تومان</div>
      )}
      {projects.map((project) => {
        const revenue = project.units.filter((u) => u.status === "sold").reduce((s, u) => s + totalPriceOf(u), 0);
        const rows = project.units.slice().sort((a, b) => a.floor - b.floor || a.unitNumber.localeCompare(b.unitNumber));
        return (
          <div key={project.id} style={{ marginBottom: 26, pageBreakInside: "avoid" }}>
            <div style={{ fontWeight: 800, fontSize: 15, margin: "10px 0" }}>{project.name}</div>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
              <thead>
                <tr style={{ background: "#F4F6F5" }}>
                  {["طبقه", "واحد", "وضعیت", "متراژ", "جهت", "خریدار", "تلفن", "کد پستی", "مبلغ کل", "پرداخت‌شده", "مانده"].map((h) => (
                    <th key={h} style={{ ...td, textAlign: "right" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map((u) => (
                  <tr key={u.id}>
                    <td style={td}>{u.floor}</td>
                    <td style={td}>{u.unitNumber}</td>
                    <td style={td}>{STATUS[u.status].label}</td>
                    <td style={td}>{u.area || "-"}</td>
                    <td style={td}>{u.direction && u.direction !== "none" ? DIRECTIONS[u.direction] : "-"}</td>
                    <td style={td}>{u.buyerName || "-"}</td>
                    <td style={td}>{u.buyerPhone || "-"}</td>
                    <td style={td}>{u.postalCode || "-"}</td>
                    <td style={td}>{fmt(totalPriceOf(u))}</td>
                    <td style={td}>{fmt(paidOf(u))}</td>
                    <td style={td}>{fmt(remainingOf(u))}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div style={{ fontSize: 12, fontWeight: 700, marginTop: 8 }}>مجموع درآمد حاصل از فروش این پروژه: {fmt(revenue)} تومان</div>
          </div>
        );
      })}
    </div>
  );
}

function Field({ label, value, onChange, type = "text", icon }) {
  return (
    <div>
      <label className="text-xs text-[#6B7280] font-medium flex items-center gap-1">{icon}{label}</label>
      <input type={type} value={value} onChange={(e) => onChange(e.target.value)}
        className="w-full mt-1 bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]" />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
